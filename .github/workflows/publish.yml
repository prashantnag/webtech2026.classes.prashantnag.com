name: Quarto Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-ci.txt'

      - name: Install Jupyter
        run: python -m pip install --upgrade pip -r .github/requirements-ci.txt

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::knitr
            any::kableExtra
            any::withr
            any::here
            any::yaml
            any::targets
            any::lubridate
            any::glue
            any::calendar
            any::rmarkdown

      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Cache Julia dependencies
        uses: julia-actions/cache@v2

      - name: Install Julia Jupyter kernel and quiz dependencies
        run: |
          julia -e 'ENV["JUPYTER"] = "jupyter"; import Pkg; Pkg.add(["IJulia", "QuizQuestions"]); using IJulia; installkernel("julia-1.12")'

      - name: Verify available Jupyter kernels
        run: |
          quarto check jupyter
          jupyter kernelspec list

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Render Quarto site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
