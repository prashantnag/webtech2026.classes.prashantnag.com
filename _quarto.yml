project:
  type: website
  output-dir: _site
  resources:
    - CNAME
  render:
    - "*.qmd"
    - "content/"
    - "assignment/"
    - "labs/"
    - "quiz/"
    - "resource/"
    - "lectures/"

# Add extensions for icons and advanced features
extensions:
  - quarto-ext/fontawesome

website:
  page-navigation: true
  bread-crumbs: false
  title: "Web Technology - BMC201"
  description: "Website for BMC201 Web Technology course (MCA Semester 2) at GCET, following AKTU curriculum"
  site-url: "https://webtech2026.classes.prashantnag.com"

  repo-url: "https://github.com/prashantnag/webtech2026.classes.prashantnag.com"
  repo-actions: [edit, issue]

  open-graph: true
  twitter-card:
    creator: "@prashantnag"
    site: "@prashantnag"
  google-analytics:
    tracking-id: "G-55BKX62YZH"
    anonymize-ip: true
  cookie-consent:
    type: implied
    style: simple
    palette: dark

  navbar:
    background: "#2C3E50"
    logo: files/favicon.svg
    # logo-alt: "BMC201 Web Technology logo"
    collapse-below: lg
    left:
      - text: "Home"
        file: index.qmd
      - text: "Syllabus"
        file: syllabus.qmd
      - text: "Schedule"
        menu:
          - text: "Course Schedule Overview"
            file: schedule.qmd
          - text: "Week 01"
            file: content/week-01.qmd
          - text: "Week 02"
            file: content/week-02.qmd
          - text: "Week 03"
            file: content/week-03.qmd
          - text: "Week 04"
            file: content/week-04.qmd
          - text: "Week 05"
            file: content/week-05.qmd
          - text: "Week 06-07 (Mid-Sem)"
            file: content/week-06.qmd
          - text: "Week 08"
            file: content/week-08.qmd
          - text: "Week 09"
            file: content/week-09.qmd
          - text: "Week 10"
            file: content/week-10.qmd
          - text: "Week 11"
            file: content/week-11.qmd
          - text: "Week 12"
            file: content/week-12.qmd
      - text: "Materials"
        menu:
          - text: "Labs Overview"
            file: labs/index.qmd
          - text: "Lab 01"
            file: labs/lab-01.qmd
          - text: "Lab 02"
            file: labs/lab-02.qmd
          - text: "Lab 03"
            file: labs/lab-03.qmd
          - text: "Lab 04"
            file: labs/lab-04.qmd
          - text: "Lab 05"
            file: labs/lab-05.qmd
          - text: "Lab 06"
            file: labs/lab-06.qmd
          - text: "Lab 07"
            file: labs/lab-07.qmd
          - text: "Lab 08"
            file: labs/lab-08.qmd
          - text: "Lab 09"
            file: labs/lab-09.qmd
          - text: "Quizzes"
            file: quiz/index.qmd
          - text: "Resources"
            file: resource/index.qmd
      - text: "Assessments"
        menu:
          - text: "Assignments"
            file: assignment/index.qmd

  page-footer:
    left: |
      Content © 2026 by [Prashant Kumar Nag](https://prashantnag.com) <br>
      All content licensed under a [Creative Commons Attribution-NonCommercial 4.0 International license (CC BY-NC 4.0)](https://creativecommons.org/licenses/by-nc/4.0/)
    right: |
      Made with [R](https://www.r-project.org/) and [Quarto](https://quarto.org/)<br>
      [View the source on GitHub](https://github.com/prashantnag/webtech2026.classes.prashantnag.com)

format:
  html:
    theme:
      light:
        - cosmo
        - html/custom.scss
      dark:
        - darkly
        - html/custom-dark.scss
    css:
      - html/styles.css
    toc: true
    code-copy: true
    code-overflow: wrap
    # mainfont: "Atkinson Hyperlegible"
    highlight-style: github

execute:
  freeze: auto

# Course-specific variables - NESTED (not flattened)
course:
  number: "BMC201"
  title: "Web Technology"
  semester: "MCA Semester 2"
  year: "2025-26"
  credits: "4 (3-1-0)"
  curriculum: "AKTU MCA Model Curriculum 2020-21"
  copyright_year: "2026"
  github: "https://github.com/prashantnag/webtech2026.classes.prashantnag.com"
  institution: "Galgotias College of Engineering & Technology"

instructor:
  name: "Mr. Prashant Kumar Nag"
  name_no_title: "Prashant Kumar Nag"
  title: "Assistant Professor"
  email: "prashantkumar.nag@galgotiacollege.edu"
  url: "https://prashantnag.com"
  office: "Department of Computer Applications"
