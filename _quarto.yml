project:
  type: website
  output-dir: _site
  resources:
    - CNAME
  render:
    - "*.qmd"
    - "content/"
    - "assignment/"
    - "labs/"
    - "quiz/"
    - "resource/"
    - "lectures/"

# Add extensions for icons and advanced features
extensions:
  - quarto-ext/fontawesome

website:
  page-navigation: true
  bread-crumbs: true
  title: "Web Technology - BMC201"
  description: "Website for BMC201 Web Technology course (MCA Semester 2) at GCET, following AKTU curriculum"
  site-url: "https://webtech2026.classes.prashantnag.com"

  repo-url: "https://github.com/prashantnag/webtech2026.classes.prashantnag.com"
  repo-actions: [edit, issue]

  open-graph:
    title: "Web Technology - BMC201"
    description: "Course website for BMC201 Web Technology (MCA Semester 2) at GCET, following AKTU curriculum. Covers HTML, CSS, JavaScript, and modern web frameworks."
    image: "files/og-image.png"
    image-width: 1200
    image-height: 630
    locale: "en_US"
    site-name: "BMC201 Web Technology — GCET"
  twitter-card:
    creator: "@prashantnag"
    site: "@prashantnag"
  google-analytics:
    tracking-id: "G-J39XDHGG85"
    anonymize-ip: true
  cookie-consent:
    type: implied
    style: simple
    palette: light
  announcement:
    content: "📢 Supplementary course website — official activities on Moodle. Content is updated regularly. Feedback welcome!"
    type: primary
    position: below-navbar

  sidebar:
    style: docked
    background: "#2C3E50"
    logo: files/favicon.svg
    tools:
      - icon: github
        href: "https://github.com/prashantnag/webtech2026.classes.prashantnag.com"
        text: "GitHub"
    search: true
    contents:
      - section: "Course information"
        contents:
          - course-overview.qmd
          - syllabus.qmd
          - text: "Schedule"
            file: index.qmd
          - resource/index.qmd
      - section: "Assignments"
        collapsed: true
        contents:
          - assignment/01-assignment.qmd
          - assignment/02-assignment.qmd
          - assignment/03-assignment.qmd
          - assignment/04-assignment.qmd
      - section: "Labs"
        collapsed: true
        contents:
          - labs/lab-01.qmd
          - labs/lab-02.qmd
          - labs/lab-03.qmd
          - labs/lab-04.qmd
          - labs/lab-05.qmd
          - labs/lab-06.qmd
          - labs/lab-07.qmd
          - labs/lab-08.qmd
          - labs/lab-09.qmd
      - section: "Quizzes"
        contents:
          - quiz/index.qmd

  page-footer:
    left: |
      Content © 2026 by [Prashant Kumar Nag](https://prashantnag.com) <br>
      All content licensed under a [Creative Commons Attribution-NonCommercial 4.0 International license (CC BY-NC 4.0)](https://creativecommons.org/licenses/by-nc/4.0/)
    right: |
      Made with [R](https://www.r-project.org/) and [Quarto](https://quarto.org/)<br>
      [View the source on GitHub](https://github.com/prashantnag/webtech2026.classes.prashantnag.com)

format:
  html:
    theme:
      light:
        - cosmo
        - html/custom.scss
      dark:
        - darkly
        - html/custom-dark.scss
    css:
      - html/styles.css
    toc: true
    code-copy: true
    code-overflow: scroll
    # mainfont: "Atkinson Hyperlegible"
    highlight-style: github
    code-line-numbers: true

execute:
  freeze: auto

# Course-specific variables - NESTED (not flattened)
course:
  number: "BMC201"
  title: "Web Technology"
  semester: "MCA Semester 2"
  year: "2025-26"
  credits: "4 (3-1-0)"
  curriculum: "AKTU MCA Model Curriculum 2020-21"
  copyright_year: "2026"
  github: "https://github.com/prashantnag/webtech2026.classes.prashantnag.com"
  institution: "Galgotias College of Engineering & Technology"

instructor:
  name: "Mr. Prashant Kumar Nag"
  name_no_title: "Prashant Kumar Nag"
  title: "Assistant Professor"
  email: "prashantkumar.nag@galgotiacollege.edu"
  url: "https://prashantnag.com"
  office: "Department of Computer Applications"
